<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생맞춤통합지원 협업 시스템</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Student-Centered Integrated Support</p>
        <h1>학생맞춤통합지원 협업 시스템</h1>
        <p class="subtitle">
          사례 발굴 → 접수 → 회의 → 지원 → 점검의 흐름을 학교 내에서 안전하게 연결합니다.
        </p>
      </header>

      <section id="home" class="home-actions" aria-label="메인 버튼">
        <button class="action-button" data-target="report">담임교사용 제보 버튼</button>
        <button class="action-button" data-target="case-access">각 부서 사례번호 입력 버튼</button>
        <button class="action-button" data-target="admin-login">관리자 버튼</button>
      </section>

      <section id="report" class="panel hidden" aria-live="polite">
        <h2>담임교사용 제보</h2>
        <form id="report-form">
          <label>
            학생 이름
            <input type="text" name="studentName" required />
          </label>
          <label>
            발견 유형
            <select name="issueType" required>
              <option value="">선택하세요</option>
              <option>학업</option>
              <option>출결</option>
              <option>정서·행동</option>
              <option>또래관계</option>
              <option>학교폭력</option>
              <option>자해·자살위험</option>
              <option>가정·경제</option>
              <option>건강</option>
              <option>복합위기</option>
            </select>
          </label>
          <label>
            제보 내용
            <textarea name="description" rows="4" required></textarea>
          </label>
          <div class="panel-actions">
            <button type="submit" class="primary">제보 저장</button>
            <button type="button" class="ghost" data-back>홈으로</button>
          </div>
        </form>
      </section>

      <section id="case-access" class="panel hidden" aria-live="polite">
        <h2>각 부서 사례번호 입력</h2>
        <form id="case-form">
          <label>
            사례번호
            <input type="text" name="caseNumber" placeholder="예: 2026-JD-001" required />
          </label>
          <label>
            부서
            <input type="text" name="department" placeholder="예: 보건부" required />
          </label>
          <div class="panel-actions">
            <button type="submit" class="primary">사례 접속</button>
            <button type="button" class="ghost" data-back>홈으로</button>
          </div>
        </form>
      </section>

      <section id="admin-login" class="panel hidden" aria-live="polite">
        <h2>관리자 인증</h2>
        <form id="admin-login-form">
          <label>
            관리자 비밀번호
            <input type="password" name="password" required />
          </label>
          <div class="panel-actions">
            <button type="submit" class="primary">로그인</button>
            <button type="button" class="ghost" data-back>홈으로</button>
          </div>
        </form>
      </section>

      <section id="admin" class="panel hidden" aria-live="polite">
        <h2>관리자 설정</h2>
        <p>초기 비밀번호는 <strong>1234</strong>이며, 아래에서 즉시 변경할 수 있습니다.</p>
        <form id="password-form">
          <label>
            현재 비밀번호
            <input type="password" name="currentPassword" required />
          </label>
          <label>
            새 비밀번호
            <input type="password" name="newPassword" minlength="4" required />
          </label>
          <label>
            새 비밀번호 확인
            <input type="password" name="confirmPassword" minlength="4" required />
          </label>
          <div class="panel-actions">
            <button type="submit" class="primary">비밀번호 변경</button>
            <button type="button" class="ghost" id="admin-logout">로그아웃</button>
          </div>
        </form>
      </section>

      <p id="toast" class="toast" role="status" aria-live="polite"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
