<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생맞춤통합지원 협업 웹앱</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <h1>학생맞춤통합지원 협업 웹앱</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}">대시보드</a>
      <a href="{{ url_for('new_case') }}">사례 생성</a>
      <a href="{{ url_for('join_case') }}">사례번호 접속</a>
    </nav>
  </header>

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
      <ul class="flash-list">
        {% for msg in messages %}
          <li>{{ msg }}</li>
        {% endfor %}
      </ul>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
