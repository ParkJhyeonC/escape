{% extends 'base.html' %}
{% block content %}
<section class="landing-wrap">
  <div class="landing-top">
    <div>
      <p class="landing-sub">STUDENT SUPPORT HUB</p>
      <h2>역할을 선택해 바로 시작하세요</h2>
    </div>
    <div class="role-chipset">
      <span class="role-chip active">담임교사</span>
      <span class="role-chip">부장/협력</span>
      <span class="role-chip">관리자</span>
    </div>
  </div>

  <div class="home-grid-only refined">
    <a class="home-tile refined" href="{{ url_for('homeroom_page') }}">
      <small>HOMEROOM</small>
      <strong>담임교사 페이지</strong>
      <p>학생 발견/제보 등록</p>
    </a>
    <a class="home-tile refined" href="{{ url_for('join_case') }}">
      <small>DEPARTMENT</small>
      <strong>부장님용 사례번호 접속</strong>
      <p>사례번호 기반 지원방향 입력</p>
    </a>
    <a class="home-tile refined" href="{{ url_for('dashboard') }}">
      <small>ADMIN</small>
      <strong>관리자 페이지</strong>
      <p>사례 현황/통계/생성 관리</p>
    </a>
  </div>
</section>
{% endblock %}
