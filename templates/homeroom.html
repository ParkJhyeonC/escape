{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>담임교사 발견 보고</h2>
  <form method="post" class="form-grid">
    <label>학생 이름 <input name="student_name" required></label>
    <label>학년 <input type="number" name="grade" min="1" max="6" required></label>
    <label>반 <input type="number" name="class_no" min="1" max="20" required></label>
    <label>담임교사 <input name="homeroom_teacher" required></label>

    <label>발견 유형
      <select name="risk_type" required>
        {% for risk in risk_options %}
          <option value="{{ risk }}">{{ risk }}</option>
        {% endfor %}
      </select>
    </label>

    <label>긴급도
      <select name="urgency" required>
        <option>일반</option>
        <option>주의</option>
        <option>긴급</option>
      </select>
    </label>

    <label class="full">관찰/상담 메모 <textarea name="note" rows="3"></textarea></label>
    <button type="submit">발견 보고 제출</button>
  </form>
</section>

<section class="card">
  <h3>최근 담임 보고</h3>
  <table>
    <thead><tr><th>학생</th><th>유형</th><th>긴급도</th><th>담임</th><th>접수일</th></tr></thead>
    <tbody>
      {% for r in reports %}
      <tr>
        <td>{{ r.grade }}학년 {{ r.class_no }}반 {{ r.student_name }}</td>
        <td>{{ r.risk_type }}</td>
        <td>{{ r.urgency }}</td>
        <td>{{ r.homeroom_teacher }}</td>
        <td>{{ r.created_at[:10] }}</td>
      </tr>
      {% else %}
      <tr><td colspan="5">아직 보고가 없습니다.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
